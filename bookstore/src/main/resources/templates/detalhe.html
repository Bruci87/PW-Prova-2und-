<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Detalhes do Livro</title>
</head>
<body>
<div layout:fragment="content" class="container mt-5">

    <div class="card shadow-sm border-0" style="background: #FFF; border-radius: 4px;">
        <div class="card-body p-4">
            <div class="row">
                <div class="col-md-5 text-center p-4" style="background: #fcfcfc; border-right: 1px solid #F0F0F0;">
                    <img th:src="@{/capa.jpg}" class="img-fluid" alt="Capa do Livro" style="max-height: 400px; object-fit: contain;">
                </div>

                <div class="col-md-7 p-4 d-flex flex-column">
                    <span class="badge bg-danger text-uppercase mb-2 px-3 py-2 align-self-start" style="font-weight: 700; background-color: #D10024 !important;" th:text="${livro.category}">Categoria</span>

                    <h2 class="text-uppercase fw-bold mb-1" style="color: #15161D; font-size: 28px;" th:text="${livro.title}">Título do Livro</h2>
                    <h5 class="text-muted mb-4" th:text="'Autor de destaque: ' + ${livro.author}">Autor</h5>

                    <hr style="border-color: #E4E7ED;">

                    <div class="my-3 p-3 bg-light rounded" style="border-left: 4px solid #15161D;">
                        <p class="mb-1" style="font-size: 13px; color: #666;"><i class="fa fa-barcode me-2"></i> <strong>Código ISBN:</strong> <span th:text="${livro.isbn}"></span></p>
                        <p class="mb-0" style="font-size: 13px; color: #666;"><i class="fa fa-shield-alt me-2"></i> <strong>Garantia de Entrega:</strong> Produto Original TADS Bookstore</p>
                    </div>

                    <div class="mt-4 mb-4">
                        <small class="text-uppercase text-muted d-block mb-1" style="font-weight: 700;">Preço do Livro:</small>
                        <h2 class="fw-bold" style="color: #D10024; font-size: 36px;"
                            th:text="'R$ ' + ${#numbers.formatDecimal(livro.price, 1, 2)}">R$ 0.00</h2>
                    </div>

                    <div class="d-flex gap-2 mt-auto pt-4">
                        <a th:href="@{/index}" class="btn btn-outline-secondary px-4 text-uppercase fw-bold" style="font-size: 13px; border-radius: 4px;">
                            <i class="fa fa-arrow-left me-2"></i> Voltar à Vitrine
                        </a>
                        <a th:href="@{/adicionarCarrinho(id=${livro.id})}" class="btn text-white px-5 text-uppercase fw-bold flex-grow-1" style="background-color: #D10024; font-size: 13px; border-radius: 4px;">
                            <i class="fa fa-shopping-cart me-2"></i> Adicionar ao Carrinho de Compras
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
