<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Cadastro de Livros</title>
</head>
<body>

<div layout:fragment="content" class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white" style="background-color: #15161D !important;">
                    <h4 class="mb-0"><i class="fa fa-book-medical me-2"></i> Cadastrar / Editar Livro</h4>
                </div>
                <div class="card-body p-4">

                    <form th:action="@{/salvar}" th:object="${bookFormDTO}" method="post">

                        <input type="hidden" th:field="*{id}" />

                        <div class="mb-3">
                            <label for="title" class="form-label fw-bold">Título do Livro</label>
                            <input type="text" th:field="*{title}" class="form-control" th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'" id="title">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="author" class="form-label fw-bold">Autor</label>
                            <input type="text" th:field="*{author}" class="form-control" th:classappend="${#fields.hasErrors('author')} ? 'is-invalid'" id="author">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('author')}" th:errors="*{author}"></div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="price" class="form-label fw-bold">Preço (R$)</label>
                                <input type="number" step="0.01" th:field="*{price}" class="form-control" th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'" id="price">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="category" class="form-label fw-bold">Categoria / Gênero</label>
                                <input type="text" th:field="*{category}" class="form-control" th:classappend="${#fields.hasErrors('category')} ? 'is-invalid'" id="category">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="isbn" class="form-label fw-bold">Código ISBN (Formato: ISBN-978-X)</label>
                            <input type="text" th:field="*{isbn}" class="form-control" th:classappend="${#fields.hasErrors('isbn')} ? 'is-invalid'" id="isbn" placeholder="Ex: ISBN-978-1">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('isbn')}" th:errors="*{isbn}"></div>
                        </div>

                        <div class="d-flex justify-content-end gap-2">
                            <a th:href="@{/admin}" class="btn btn-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-success" style="background-color: #D10024 !important; border-color: #D10024 !important;"><i class="fa fa-save me-1"></i> Salvar Livro</button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
