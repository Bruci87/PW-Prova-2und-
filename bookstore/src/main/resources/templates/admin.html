<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Livraria EAJ</title>

    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,500,700" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">

    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #FBFBFC; }
        #top-header { background-color: #15161D; padding-top: 10px; padding-bottom: 10px; }
        .header-links li { display: inline-block; margin-right: 15px; }
        .header-links li a { color: #B9BABC; text-decoration: none; font-size: 12px; }
        #header { background-color: #1E1F29; padding-top: 20px; padding-bottom: 20px; border-bottom: 3px solid #D10024; }
        .main-nav li { display: inline-block; margin-right: 20px; }
        .main-nav li a { color: #FFF; font-weight: 500; text-decoration: none; font-size: 15px; }
        .main-nav li a:hover { color: #D10024; }
        .admin-box { background: #FFF; border: 1px solid #E4E7ED; border-radius: 4px; padding: 30px; box-shadow: 0px 2px 5px rgba(0,0,0,0.03); margin-top: 40px; margin-bottom: 40px; }
        .table > thead > tr > th { background-color: #15161D; color: #FFF; font-weight: 700; text-transform: uppercase; border-bottom: none; font-size: 12px; padding: 12px; }
        .table > tbody > tr > td { vertical-align: middle; padding: 12px; border-color: #E4E7ED; }
        #footer { background-color: #15161D; color: #B9BABC; padding: 30px 0; margin-top: 60px; }
    </style>
</head>
<body>

<div id="top-header">
    <div class="container">
        <ul class="header-links list-inline pull-left" style="margin: 0;">
            <li><a href="#"><i class="fa fa-phone"></i> +55 (84) 9999-9999</a></li>
            <li><a href="#"><i class="fa fa-envelope-o"></i> eaj@ufrn.br</a></li>
        </ul>
        <ul class="header-links list-inline pull-right" style="margin: 0;">
            <li sec:authorize="isAuthenticated()"><span style="color: #FFF; font-weight: 700;"><i class="fa fa-user"></i> Olá, <span sec:authentication="name" style="color: #D10024;">Usuário</span>!</span></li>
            <li sec:authorize="isAuthenticated()"><a th:href="@{/logout}" style="font-weight: 700; margin-left: 10px;"><i class="fa fa-sign-out"></i> Sair</a></li>
        </ul>
    </div>
</div>

<div id="header">
    <div class="container">
        <div class="row">
            <div class="col-md-3">
                <a th:href="@{/index}" style="text-decoration: none;"><h2 style="color: white; margin: 0; font-weight: 700;">Livraria<span style="color: #D10024;">EAJ</span></h2></a>
            </div>
            <div class="col-md-9">
                <ul class="main-nav list-inline" style="margin: 0; padding-top: 5px;">
                    <li><a th:href="@{/index}">Início</a></li>
                    <li><a th:href="@{/admin}" style="color: #D10024; font-weight: 700;">Painel Admin</a></li>
                    <li><a th:href="@{/cadastro}">Cadastrar Livro</a></li>
                </ul>
            </div>
        </div>
    </div>
</div>

<div class="container">
    <div class="admin-box">
        <div class="row" style="margin-bottom: 20px;">
            <div class="col-md-6">
                <h3 class="text-uppercase" style="font-weight: 700; color: #15161D; margin: 0; padding-top: 8px;">
                    <i class="fa fa-cogs" style="color: #D10024; margin-right: 10px;"></i> Gerenciar Catálogo
                </h3>
            </div>
            <div class="col-md-6 text-right">
                <a th:href="@{/cadastro}" class="btn btn-danger" style="background-color: #D10024; font-weight: 700; text-transform: uppercase; padding: 10px 20px;">
                    <i class="fa fa-plus"></i> Novo Livro
                </a>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead>
                <tr>
                    <th style="width: 80px;">ID</th>
                    <th>Título</th>
                    <th>Autor</th>
                    <th>Categoria</th>
                    <th style="width: 120px;">Preço</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="livro : ${livros}">
                    <td th:text="${livro.id}" style="font-weight: 700; color: #8D99AE;">1</td>
                    <td th:text="${livro.title}" style="font-weight: 700; color: #15161D;">Título</td>
                    <td th:text="${livro.author}">Autor</td>
                    <td><span class="label label-default" th:text="${livro.category}" style="background-color: #E4E7ED; color: #2B2D42; font-weight: 700; text-transform: uppercase;">Categoria</span></td>
                    <td th:text="'R$ ' + ${livro.price}" style="font-weight: 700; color: #D10024;">R$ 0,00</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div id="footer"><div class="container text-center"><p style="margin: 0;">&copy; 2026 Escola Agrícola de Jundiaí - UFRN.</p></div></div>
</body>
</html>
