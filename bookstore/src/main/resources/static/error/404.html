<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Não Encontrada (404) - Livraria EAJ</title>

    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,500,700" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">

    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #FBFBFC;
            color: #2B2D42;
        }
        .error-container {
            margin-top: 100px;
            margin-bottom: 100px;
        }
        .error-code {
            font-size: 120px;
            font-weight: 700;
            color: #D10024;
            line-height: 1;
            margin-bottom: 20px;
        }
        .error-title {
            font-weight: 700;
            font-size: 28px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        .error-message {
            font-size: 16px;
            color: #8D99AE;
            margin-bottom: 30px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .btn-home {
            background-color: #D10024;
            color: #FFF;
            font-weight: 700;
            padding: 12px 30px;
            border-radius: 4px;
            text-transform: uppercase;
            text-decoration: none;
            display: inline-block;
            transition: 0.2s all;
        }
        .btn-home:hover, .btn-home:focus {
            background-color: #B1001E;
            color: #FFF;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="container text-center error-container">
    <div class="row">
        <div class="col-md-12">
            <div class="error-code">404</div>

            <h1 class="error-title">
                <i class="fa fa-map-signs"></i> Rota Não Encontrada
            </h1>

            <p class="error-message">
                O endereço (URL) que você tentou acessar não existe no nosso sistema,
                foi removido ou digitado incorretamente. Verifique a grafia e tente novamente.
            </p>

            <div style="margin-top: 40px;">
                <a href="/index" class="btn-home">
                    <i class="fa fa-arrow-left"></i> Voltar para a Vitrine
                </a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
