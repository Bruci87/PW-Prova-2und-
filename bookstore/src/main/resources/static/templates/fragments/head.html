<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"> <head th:fragment="head(pageTitle)">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title th:text="${pageTitle} + ' - Livraria EAJ'"></title>

    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,500,700" rel="stylesheet">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/style.css">

    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/font-awesome.min.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar navbar-default" style="background-color: #FFF; border-bottom: 2px solid #E4E7ED; margin-bottom: 30px;">
    <div class="container">
        <div class="navbar-header">
            <a class="navbar-brand" th:href="@{/index}" style="font-weight: 700; color: #2B2D42;">
                <i class="fa fa-book"></i> Livraria EAJ
            </a>
        </div>

        <ul class="nav navbar-nav">
            <li><a th:href="@{/index}" style="font-weight: 500;">Vitrine</a></li>
            <li sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/admin}" style="font-weight: 500; color: #D10024;">Painel Admin</a>
            </li>
        </ul>

        <ul class="nav navbar-nav navbar-right" style="margin-right: 10px;">
            <li sec:authorize="isAuthenticated()">
                <p class="navbar-text" style="color: #2B2D42; font-weight: 700; margin-top: 15px; margin-bottom: 15px;">
                    <i class="fa fa-user"></i> Olá, <span sec:authentication="name" style="color: #D10024;">Usuário</span>!
                </p>
            </li>
            <li sec:authorize="isAuthenticated()">
                <a th:href="@{/logout}" style="font-weight: 700; color: #8D99AE;">
                    <i class="fa fa-sign-out"></i> Sair
                </a>
            </li>
        </ul>
    </div>
</nav>

</body>
</html>
</html>
