<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Vitrine de Livros</title>
</head>
<body>
<div layout:fragment="content" class="container mt-4">

    <div th:if="${mensagemSucesso}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert" style="border-left: 5px solid #28a745;">
        <i class="fa fa-check-circle me-2"></i> <span th:text="${mensagemSucesso}">Sucesso!</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="row align-items-center mb-4" style="border-bottom: 2px solid #E4E7ED; padding-bottom: 15px;">
        <div class="col-md-6">
            <h2 class="text-uppercase fw-bold" style="color: #15161D; margin: 0; font-size: 24px;">Nossos Livros</h2>
        </div>
        <div class="col-md-6 text-end">
            <a th:href="@{/verCarrinho}" class="btn text-white position-relative shadow-sm" style="background-color: #15161D; font-weight: 600;">
                <i class="fa fa-shopping-cart me-2" style="color: #D10024;"></i> Meu Carrinho
                <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill"
                      style="background-color: #D10024;"
                      th:text="${qtdCarrinho != null ? qtdCarrinho : 0}">0</span>
            </a>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(livros)}" class="alert text-center py-5 shadow-sm" style="background: #FFF; border: 1px dashed #D10024;">
        <i class="fa fa-book-open fa-3x text-muted mb-3"></i>
        <p class="text-muted mb-0 fw-bold">Nenhum livro disponível na vitrine no momento.</p>
        <small class="text-secondary">Acesse o Painel Admin para cadastrar novos títulos!</small>
    </div>

    <div class="row" th:if="${!#lists.isEmpty(livros)}">
        <div class="col-md-3 col-sm-6 mb-4" th:each="livro : ${livros}">
            <div class="card h-100 shadow-sm border-0 product-card" style="background: #FFF; transition: 0.3s; border-radius: 4px;">

                <a th:href="@{/detalhe/{id}(id=${livro.id})}" class="text-decoration-none">
                    <div class="text-center p-3" style="background: #fcfcfc; border-bottom: 1px solid #F0F0F0;">
                        <img th:src="@{/capa.jpg}" class="img-fluid" alt="Capa do Livro" style="height: 200px; width: 100%; object-fit: contain;">
                    </div>
                </a>

                <div class="card-body d-flex flex-column p-3">
                    <p class="text-uppercase text-muted mb-1" style="font-size: 10px; font-weight: 700;" th:text="${livro.category}">Categoria</p>

                    <h5 class="card-title mb-1" style="font-size: 14px; font-weight: 700; min-height: 42px;">
                        <a th:href="@{/detalhe/{id}(id=${livro.id})}" class="text-dark text-decoration-none text-uppercase" th:text="${livro.title}">Título do Livro</a>
                    </h5>

                    <p class="card-text text-secondary mb-3" style="font-size: 12px;" th:text="'Por: ' + ${livro.author}">Autor</p>

                    <div class="mt-auto">
                        <h4 class="fw-bold mb-2" style="color: #D10024; font-size: 18px;"
                            th:text="'R$ ' + ${#numbers.formatDecimal(livro.price, 1, 2)}">R$ 0.00</h4>

                        <a th:href="@{/adicionarCarrinho(id=${livro.id})}" class="btn w-100 text-white text-uppercase" style="background-color: #D10024; font-size: 12px; font-weight: 700; border-radius: 4px;">
                            <i class="fa fa-shopping-cart me-1"></i> Add ao Carrinho
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
