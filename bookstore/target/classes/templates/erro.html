<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Erro no Sistema</title>
</head>
<body>
<div layout:fragment="content" class="container mt-5 text-center">
    <div class="alert alert-danger py-5 shadow-sm">
        <i class="fa fa-exclamation-triangle fa-3x mb-3"></i>
        <h3>Ops! Ocorreu um erro interno.</h3>
        <p class="text-muted">O servidor não conseguiu processar a requisição corretamente.</p>
        <a th:href="@{/index}" class="btn btn-primary mt-3">Voltar para a Vitrine</a>
    </div>
</div>
</body>
</html>
