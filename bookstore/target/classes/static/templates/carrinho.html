<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: mainLayout('Meu Carrinho de Compras', ~{:: #conteudoCarrinho})}">

<div id="conteudoCarrinho">
    <div class="row" style="margin-bottom: 20px;">
        <div class="col-md-12">
            <h2 style="text-transform: uppercase; border-bottom: 2px solid #D10024; padding-bottom: 10px;">
                <i class="fa fa-shopping-cart"></i> Itens no meu Carrinho
            </h2>
        </div>
    </div>

    <div class="row">
        <div class="col-md-12" style="background: #FFF; padding: 20px; border: 1px solid #E4E7ED; border-radius: 4px;">

            <table class="table table-striped table-hover">
                <thead>
                <tr style="color: #2B2D42; font-weight: 700;">
                    <th style="width: 100px;" class="text-center">Capa</th>
                    <th>Título</th>
                    <th>Autor</th>
                    <th>Categoria</th>
                    <th class="text-right">Preço Unitário</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${itensCarrinho}">
                    <td style="vertical-align: middle;">
                        <img th:src="@{${item.imgUrl}}" alt="Capa" style="max-height: 60px; display: block; margin: 0 auto;" />
                    </td>
                    <td style="vertical-align: middle; font-weight: 700; color: #2B2D42;" th:text="${item.title}"></td>
                    <td style="vertical-align: middle;" th:text="${item.author}"></td>
                    <td style="vertical-align: middle;" th:text="${item.category}"></td>
                    <td style="vertical-align: middle; font-weight: 700; color: #D10024;" class="text-right"
                        th:text="'R$ ' + ${#numbers.formatDecimal(item.price, 1, 'POINT', 2, 'COMMA')}"></td>
                </tr>
                </tbody>
            </table>

            <div class="row" style="margin-top: 30px; padding: 20px; background: #FBFBFC; border-top: 2px solid #E4E7ED;">
                <div class="col-md-6 col-xs-12" style="margin-bottom: 15px;">
                    <a th:href="@{/index}" class="btn btn-default" style="font-weight: 700; border: 1px solid #E4E7ED; border-radius: 0; padding: 10px 20px;">
                        <i class="fa fa-arrow-left"></i> Continuar Comprando
                    </a>
                </div>

                <div class="col-md-6 col-xs-12 text-right">
                    <h3 style="margin: 0 0 15px 0; color: #2B2D42; font-size: 20px;">
                        Total da Compra:
                        <span style="color: #D10024; font-weight: 700;"
                              th:text="'R$ ' + ${#numbers.formatDecimal(totalGeral, 1, 'POINT', 2, 'COMMA')}">R$ 0,00</span>
                    </h3>

                    <a th:href="@{/finalizarCompra}" class="btn btn-danger"
                       style="background-color: #D10024; font-weight: 700; padding: 10px 30px; border-radius: 0; text-transform: uppercase; text-decoration: none; display: inline-block;">
                        <i class="fa fa-check"></i> Finalizar Compra
                    </a>
                </div>
            </div>

        </div>
    </div>
</div>
</html>
