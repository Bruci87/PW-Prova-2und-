<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: mainLayout('Cadastrar Novo Livro', ~{:: #conteudoCadastro})}">

<div id="conteudoCadastro">
    <div class="row" style="margin-bottom: 20px;">
        <div class="col-md-12">
            <h2 style="text-transform: uppercase; border-bottom: 2px solid #D10024; padding-bottom: 10px;">
                Novo Cadastro de Livro
            </h2>
        </div>
    </div>

    <div class="row">
        <div class="col-md-6 col-md-offset-3" style="background: #FFF; padding: 30px; border: 1px solid #E4E7ED; border-radius: 4px;">

            <form th:action="@{/salvar}" th:object="${bookFormDTO}" method="POST">

                <input type="hidden" th:field="*{id}" />

                <div class="form-group" style="margin-bottom: 15px;">
                    <label style="font-weight: 700; color: #2B2D42;">Título do Livro *</label>
                    <input type="text" th:field="*{title}" class="form-control" placeholder="Ex: O Programador Pragmático" style="border-radius: 0;" />
                    <span th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="text-danger" style="font-size: 12px; font-weight: 700;"></span>
                </div>

                <div class="form-group" style="margin-bottom: 15px;">
                    <label style="font-weight: 700; color: #2B2D42;">Autor *</label>
                    <input type="text" th:field="*{author}" class="form-control" placeholder="Ex: Andrew Hunt" style="border-radius: 0;" />
                    <span th:if="${#fields.hasErrors('author')}" th:errors="*{author}" class="text-danger" style="font-size: 12px; font-weight: 700;"></span>
                </div>

                <div class="form-group" style="margin-bottom: 15px;">
                    <label style="font-weight: 700; color: #2B2D42;">ISBN (Código do Livro) *</label>
                    <input type="text" th:field="*{isbn}" class="form-control" placeholder="Ex: 978-3-16-148410-0" style="border-radius: 0;" />
                    <span th:if="${#fields.hasErrors('isbn')}" th:errors="*{isbn}" class="text-danger" style="font-size: 12px; font-weight: 700;"></span>
                </div>

                <div class="form-group" style="margin-bottom: 15px;">
                    <label style="font-weight: 700; color: #2B2D42;">Categoria *</label>
                    <select th:field="*{category}" class="form-control" style="border-radius: 0;">
                        <option value="">-- Selecione uma Categoria --</option>
                        <option value="Tecnologia">Tecnologia</option>
                        <option value="Ficção">Ficção</option>
                        <option value="Biografia">Biografia</option>
                        <option value="Desenvolvimento Pessoal">Desenvolvimento Pessoal</option>
                    </select>
                    <span th:if="${#fields.hasErrors('category')}" th:errors="*{category}" class="text-danger" style="font-size: 12px; font-weight: 700;"></span>
                </div>

                <div class="form-group" style="margin-bottom: 25px;">
                    <label style="font-weight: 700; color: #2B2D42;">Preço (R$) *</label>
                    <input type="number" step="0.01" th:field="*{price}" class="form-control" placeholder="0.00" style="border-radius: 0;" />
                    <span th:if="${#fields.hasErrors('price')}" th:errors="*{price}" class="text-danger" style="font-size: 12px; font-weight: 700;"></span>
                </div>

                <div style="display: flex; gap: 10px;">
                    <button type="submit" class="btn btn-danger" style="background-color: #D10024; font-weight: 700; flex: 1;">
                        <i class="fa fa-save"></i> Salvar Livro
                    </button>
                    <a th:href="@{/admin}" class="btn btn-default" style="font-weight: 700; flex: 1; border: 1px solid #E4E7ED;">
                        Cancelar
                    </a>
                </div>
            </form>

        </div>
    </div>
</div>
</html>
